<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users — EliteFit Admin</title>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #F7F5FF; min-height: 100vh; color: #1E1B2E; }

.topbar {
  background: linear-gradient(135deg, #7C3AED, #5B21B6);
  padding: 0 28px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 20px rgba(124,58,237,0.3);
}

.back-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: white; padding: 8px 16px;
  border-radius: 20px; font-size: 13px; font-weight: 700;
  cursor: pointer; text-decoration: none;
  display: flex; align-items: center; gap: 6px; transition: 0.2s;
}
.back-btn:hover { background: rgba(255,255,255,0.25); }

.topbar-brand { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 36px; height: 36px; background: rgba(255,255,255,0.2);
  border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.topbar-brand h1 { color: white; font-size: 15px; font-weight: 900; letter-spacing: 2.5px; }

.main { max-width: 900px; margin: 0 auto; padding: 32px 24px 60px; }

.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
}

.page-title { display: flex; align-items: center; gap: 14px; }

.title-icon {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #7C3AED, #5B21B6);
  border-radius: 14px; display: flex; align-items: center; justify-content: center;
  font-size: 22px; box-shadow: 0 6px 18px rgba(124,58,237,0.3);
}

.page-title h2 { font-size: 22px; font-weight: 900; color: #1E1B2E; }
.page-title p  { font-size: 13px; color: #7C6FAF; margin-top: 2px; }

.count-badge {
  background: rgba(124,58,237,0.1);
  color: #7C3AED;
  border: 1px solid rgba(124,58,237,0.2);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 700;
}

.search-bar {
  background: white;
  border: 1.5px solid #DDD6FE;
  border-radius: 14px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
  box-shadow: 0 2px 10px rgba(124,58,237,0.05);
}

.search-bar input {
  border: none; background: transparent;
  font-size: 14px; color: #1E1B2E;
  outline: none; width: 100%;
}

.search-bar input::placeholder { color: #9E94CC; }
.search-icon { color: #9E94CC; font-size: 16px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

.user-card {
  background: white;
  border-radius: 18px;
  padding: 20px;
  border: 1.5px solid #DDD6FE;
  box-shadow: 0 2px 12px rgba(124,58,237,0.06);
  transition: 0.2s;
}

.user-card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(124,58,237,0.12); border-color: #C4B5FD; }

.user-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }

.avatar {
  width: 46px; height: 46px; border-radius: 14px;
  background: linear-gradient(135deg, #7C3AED, #9F6FF5);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; color: white; flex-shrink: 0;
}

.user-header h3 { font-size: 15px; font-weight: 800; color: #1E1B2E; margin-bottom: 2px; }
.user-header p  { font-size: 12px; color: #7C6FAF; }

.info-row {
  display: flex; gap: 8px; align-items: center;
  font-size: 13px; color: #7C6FAF; margin-bottom: 8px;
}
.info-row span { color: #1E1B2E; font-weight: 600; }

.tag {
  display: inline-block;
  background: rgba(124,58,237,0.08);
  color: #7C3AED;
  border-radius: 8px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 700;
  margin-top: 4px;
}

.divider { height: 1px; background: #EFEBFF; margin: 12px 0; }

.loading {
  text-align: center; padding: 60px; color: #9E94CC;
  font-size: 15px; grid-column: 1/-1;
}

.spinner {
  width: 36px; height: 36px;
  border: 3px solid #EFEBFF;
  border-top-color: #7C3AED;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.empty { text-align: center; padding: 60px; color: #9E94CC; grid-column: 1/-1; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="index.html">← Dashboard</a>
  <div class="topbar-brand">
    <div class="brand-logo">💪</div>
    <h1>E L I T E F I T</h1>
  </div>
  <div style="width:80px"></div>
</div>

<div class="main">

  <div class="page-header">
    <div class="page-title">
      <div class="title-icon">👥</div>
      <div>
        <h2>Registered Users</h2>
        <p>All members on EliteFit</p>
      </div>
    </div>
    <div class="count-badge" id="countBadge">Loading...</div>
  </div>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search by name or email..." oninput="filterUsers()">
  </div>

  <div class="grid" id="userList">
    <div class="loading">
      <div class="spinner"></div>
      Loading users...
    </div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC7-qD6CyO0lPzZA3JL0O4w9M5Hltprl54",
  authDomain: "newgym-b6b87.firebaseapp.com",
  projectId: "newgym-b6b87",
  storageBucket: "newgym-b6b87.firebasestorage.app",
  messagingSenderId: "760039903820",
  appId: "1:760039903820:web:d29f2c7afbdd6fac6a5ae9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allUsers = [];

function getInitials(name) {
  if (!name) return "?";
  return name.trim().split(" ").map(n => n[0]).join("").toUpperCase().slice(0,2);
}

function renderUsers(users) {
  const list = document.getElementById("userList");
  if (!users.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">👤</div>No users found.</div>`;
    return;
  }
  list.innerHTML = users.map(u => `
    <div class="user-card">
      <div class="user-header">
        <div class="avatar">${getInitials(u.name)}</div>
        <div>
          <h3>${u.name || "Unknown"}</h3>
          <p>${u.email || "No email"}</p>
        </div>
      </div>
      <div class="divider"></div>
      ${u.age    ? `<div class="info-row">🎂 Age <span>${u.age} yrs</span></div>` : ""}
      ${u.height ? `<div class="info-row">📏 Height <span>${u.height} cm</span></div>` : ""}
      ${u.weight ? `<div class="info-row">⚖️ Weight <span>${u.weight} kg</span></div>` : ""}
      ${u.goal   ? `<div class="tag">🎯 ${u.goal}</div>` : ""}
      ${u.gender ? `<div class="tag" style="margin-left:6px">👤 ${u.gender}</div>` : ""}
    </div>
  `).join("");
}

function filterUsers() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  renderUsers(allUsers.filter(u =>
    (u.name || "").toLowerCase().includes(q) ||
    (u.email || "").toLowerCase().includes(q)
  ));
}

db.collection("users").get().then(snap => {
  allUsers = snap.docs.map(d => d.data());
  document.getElementById("countBadge").textContent = `${allUsers.length} Users`;
  renderUsers(allUsers);
}).catch(e => {
  document.getElementById("userList").innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Error loading users.</div>`;
});
</script>
</body>
</html>
